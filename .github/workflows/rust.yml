name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --all-targets -- -D warnings

  test:
    strategy:
      matrix:
        features:
          - ""
          - "--no-default-features --features srt"
        include:
          - features: ""
            test-args: ""
          - features: "--no-default-features --features srt"
            test-args: "--lib"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --verbose ${{ matrix.features }}
      - run: cargo test --verbose ${{ matrix.features }} ${{ matrix.test-args }}

  examples:
    strategy:
      matrix:
        features:
          - ""
          - "--no-default-features --features srt"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --examples --verbose ${{ matrix.features }}
